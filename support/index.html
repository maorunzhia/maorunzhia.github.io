<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赞助页面</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    text-align: center;
  }
  
  #sponsorship {
    margin: 20px auto;
    max-width: 600px;
    padding: 20px;
    border: 1px solid #ccc;
    border-radius: 8px;
  }
  
  #qrCode {
    width: 300px;
    height: 300px;
    margin: 20px auto;
    display: block;
  }
  
  #sponsorList {
    text-align: left;
    margin-top: 20px;
  }
  
  #sponsorList table {
    width: 100%;
    border-collapse: collapse;
  }
  
  #sponsorList th, #sponsorList td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
  }
  
  #sponsorList th {
    background-color: #f2f2f2;
    text-align: left;
  }

  #sponsorList tr {
    cursor: pointer;
    transition: background-color 0.2s;
  }

  #sponsorList tr:hover {
    background-color: #f9f9f9;
  }

  .message-row {
    display: none;
    background-color: #f8f8f8;
  }

  .message-row td {
    padding: 10px;
    color: #555;
    font-size: 14px;
    border-bottom: 1px solid #ddd;
  }

  .no-message {
    color: #999;
    font-style: italic;
  }
</style>
</head>
<body>
<div id="sponsorship">
  <h1>赞助我们</h1>
  <h3>赞助时可以备注一下网络昵称</h3>
  <p>感谢您的慷慨赞助！</p>
  <p>捐赠收入将用于维持App的良好运行~</p>
  <img id="qrCode" src="1.png" alt="赞助二维码">
  <div id="sponsorList">
    <h2>赞助名单</h2>
    <p>点击名称查看留言</p>
    <table>
      <thead>
        <tr>
          <th>名称</th>
          <th>金额</th>
        </tr>
      </thead>
      <tbody id="sponsorData">
        <!-- 赞助名单将由JavaScript动态生成 -->
      </tbody>
    </table>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
  // 赞助名单数据
  var sponsors = [
    { name: 'WQ.', amount: 1, message: '小代不呆' },
    { name: 'C 王先森彡', amount: 5.2, message: '你终于又回来了！' },
    { name: '羽霖咲华', amount: 10, message: '补票，6年前你送了我一个奇鸽永久会员，我决定补回来' },
    { name: '怎扰', amount: 5, message: '匿名用了很久了，确实厉害' },
    { name: '唔西迪西', amount: 5, message: '' },
    { name: '小米粥同学', amount: 5, message: '' }
  ];

  // 按金额降序排序
  sponsors.sort(function(a, b) {
    return b.amount - a.amount;
  });

  var sponsorDataElement = document.getElementById("sponsorData");

  // 动态生成赞助名单
  sponsors.forEach(function(sponsor) {
    // 主行（显示昵称和金额）
    var row = document.createElement("tr");
    row.innerHTML = "<td>" + sponsor.name + "</td><td>" + sponsor.amount + "</td>";
    sponsorDataElement.appendChild(row);

    // 留言行（也是 tr，放在表格里合法）
    var msgRow = document.createElement("tr");
    msgRow.className = "message-row";
    var msgText = sponsor.message.trim() ? sponsor.message : '<span class="no-message">（无留言）</span>';
    msgRow.innerHTML = '<td colspan="2">' + msgText + '</td>';
    sponsorDataElement.appendChild(msgRow);
  });

  // 事件委托：点击主行时展开/收起留言
  sponsorDataElement.addEventListener("click", function(e) {
    var row = e.target.closest("tr");
    if (!row || row.classList.contains("message-row")) return;
    
    var msgRow = row.nextElementSibling;
    if (!msgRow) return;

    if (msgRow.style.display === "table-row") {
      msgRow.style.display = "none";
    } else {
      // 先收起其他已展开的留言（可选，想要同时展开多个可以删掉这段）
      document.querySelectorAll(".message-row").forEach(function(r) {
        r.style.display = "none";
      });
      msgRow.style.display = "table-row";
    }
  });
});
</script>
</body>
</html>
